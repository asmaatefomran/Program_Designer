
services:

  postgres:
    image: postgres:16
    container_name: programdesigner-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: programdesigner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d programdesigner" ]
      interval: 5s
      timeout: 5s
      retries: 10

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:

    build:
      context: .
      dockerfile: src/ProgramDesigner.Api/Dockerfile

    container_name: programdesigner-api

    depends_on:
      postgres:
          condition: service_healthy

    ports:
      - "5000:8080"

    environment:

      ASPNETCORE_ENVIRONMENT: Docker

      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=programdesigner;Username=postgres;Password=postgres


  tests:

    build:
      context: .
      dockerfile: tests/ProgramDesigner.Tests/Dockerfile

    container_name: programdesigner-tests

    depends_on:
      postgres:
          condition: service_healthy

    environment:

      ASPNETCORE_ENVIRONMENT: Testing

      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=programdesigner;Username=postgres;Password=postgres

    profiles:
      - tests

volumes:

  postgres-data: